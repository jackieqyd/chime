<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLife - 添加饮食</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Nunito', sans-serif; }
  </style>
</head>
<body>
<div id="app">
  <!-- ===== HAPPY ADD DIET ===== -->
  <div style="background:linear-gradient(180deg,#fff0f9 0%,#fff8f0 50%,#f0f8ff 100%);min-height:100vh;position:relative;">

    <!-- Header -->
    <div style="background:linear-gradient(135deg,#f472b6,#fb923c,#fbbf24);padding:44px 20px 22px;position:relative;overflow:hidden;border-radius:0 0 30px 30px;flex-shrink:0;">
      <div style="position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:rgba(255,255,255,0.1);border-radius:50%;"></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="happy-add-diet-back-btn" style="width:38px;height:38px;background:rgba(255,255,255,0.25);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.35);">
          <i data-lucide="arrow-left" style="width:18px;height:18px;color:white;"></i>
        </div>
        <div>
          <h2 style="color:white;font-size:19px;font-weight:900;letter-spacing:-0.3px;">添加饮食记录</h2>
          <p style="color:rgba(255,255,255,0.8);font-size:12px;margin-top:2px;" id="happy-add-diet-date">今天也要认真吃饭哦 🍽️</p>
        </div>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="scroll-content" style="padding:16px;padding-bottom:110px;">

      <!-- Step 1: Meal Type -->
      <div style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:24px;height:24px;background:linear-gradient(135deg,#f472b6,#fb923c);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="color:white;font-size:12px;font-weight:800;">1</span>
          </div>
          <span style="font-size:14px;font-weight:800;color:#1f2937;">选择餐次</span>
          <span style="font-size:11px;color:#f9a8d4;font-weight:600;">必填 ✦</span>
        </div>
        <div style="display:flex;gap:8px;">
          <div id="happy-meal-type-breakfast" data-type="breakfast" style="flex:1;background:linear-gradient(135deg,#fef9c3,#fde68a);border:2.5px solid #fbbf24;border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer;box-shadow:0 4px 12px rgba(251,191,36,0.25);">
            <div style="font-size:24px;margin-bottom:4px;">🌅</div>
            <div style="font-size:11px;color:#92400e;font-weight:800;">早餐</div>
          </div>
          <div id="happy-meal-type-lunch" data-type="lunch" style="flex:1;background:#f9fafb;border:2px solid transparent;border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer;">
            <div style="font-size:24px;margin-bottom:4px;">☀️</div>
            <div style="font-size:11px;color:#9ca3af;font-weight:600;">午餐</div>
          </div>
          <div id="happy-meal-type-dinner" data-type="dinner" style="flex:1;background:#f9fafb;border:2px solid transparent;border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer;">
            <div style="font-size:24px;margin-bottom:4px;">🌙</div>
            <div style="font-size:11px;color:#9ca3af;font-weight:600;">晚餐</div>
          </div>
          <div id="happy-meal-type-snack" data-type="snack" style="flex:1;background:#f9fafb;border:2px solid transparent;border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer;">
            <div style="font-size:24px;margin-bottom:4px;">🍎</div>
            <div style="font-size:11px;color:#9ca3af;font-weight:600;">加餐</div>
          </div>
        </div>
      </div>

      <!-- Step 2: Note -->
      <div style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:24px;height:24px;background:linear-gradient(135deg,#fb923c,#fbbf24);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="color:white;font-size:12px;font-weight:800;">2</span>
          </div>
          <span style="font-size:14px;font-weight:800;color:#1f2937;">记录一下吃了啥</span>
          <span style="font-size:11px;color:#f472b6;font-weight:600;">必填 ✦</span>
        </div>
        <div style="background:white;border-radius:20px;padding:14px;box-shadow:0 4px 20px rgba(244,114,182,0.08);border:1.5px solid #fce7f3;position:relative;">
          <div style="position:absolute;top:12px;right:14px;font-size:16px;opacity:0.5;">✏️</div>
          <textarea id="happy-diet-note" rows="5" placeholder="今天吃了什么美味呢？✨
比如：燕麦粥、鸡蛋、牛奶" style="width:100%;background:linear-gradient(135deg,#fff9fc,#fffdf9);border:1.5px solid #fbcfe8;border-radius:12px;padding:12px;font-size:13px;color:#1f2937;resize:none;outline:none;line-height:1.7;min-height:110px;font-family:'Nunito',sans-serif;"></textarea>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <span id="happy-diet-char-count" style="font-size:10px;color:#d1d5db;font-weight:600;">0/200</span>
          </div>
        </div>
      </div>

      <!-- Step 3: Image Upload -->
      <div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:24px;height:24px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="color:white;font-size:12px;font-weight:800;">3</span>
          </div>
          <span style="font-size:14px;font-weight:800;color:#1f2937;">上传美食照片</span>
          <span style="font-size:11px;color:#a855f7;font-weight:600;">选填 ✦</span>
        </div>
        <div style="background:white;border-radius:20px;padding:14px;box-shadow:0 4px 20px rgba(168,85,247,0.08);border:1.5px solid #f3e8ff;">
          <input type="file" id="happy-diet-image-input" accept="image/*" multiple style="display:none;">
          <div id="happy-diet-upload-trigger" style="border:2px dashed #e9d5ff;border-radius:16px;padding:20px;text-align:center;cursor:pointer;background:linear-gradient(135deg,#fdf4ff,#faf5ff);">
            <div style="font-size:36px;margin-bottom:8px;">📸</div>
            <div style="font-size:13px;font-weight:700;color:#7c3aed;margin-bottom:4px;">点击上传照片</div>
            <div style="font-size:11px;color:#a78bfa;">支持多张 · JPG / PNG · 最多6张</div>
          </div>
          <div id="happy-diet-image-preview" style="display:none;margin-top:12px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <span style="font-size:11px;font-weight:700;color:#7c3aed;" id="happy-diet-img-count">已选 0 张</span>
            </div>
            <div id="happy-diet-img-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Submit -->
    <div style="position:absolute;bottom:0;left:0;right:0;padding:12px 20px 24px;background:linear-gradient(to top,#fff8f0 70%,rgba(255,248,240,0));pointer-events:none;">
      <button id="happy-add-diet-submit-btn" style="
        width:100%;
        background:linear-gradient(135deg,#f472b6,#fb923c,#fbbf24);
        color:white;border:none;border-radius:20px;padding:16px;font-weight:800;font-size:16px;font-family:'Nunito',sans-serif;
        cursor:pointer;box-shadow:0 8px 28px rgba(244,114,182,0.45);
        display:flex;align-items:center;justify-content:center;gap:10px;pointer-events:all;
      ">
        <span style="font-size:20px;">🥢</span>
        <span>添加食物记录</span>
        <i data-lucide="sparkles" style="width:18px;height:18px;"></i>
      </button>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="img-viewer-overlay">
    <div id="img-viewer-close" style="position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="img-viewer-img" src="" alt="">
    <p id="img-viewer-caption" style="color:white;margin-top:16px;font-size:14px;text-align:center;"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  const now = new Date();
  const weekDays = ['日','一','二','三','四','五','六'];
  document.getElementById('happy-add-diet-date').textContent = (now.getMonth()+1) + '月' + now.getDate() + '日 周' + weekDays[now.getDay()] + '，今天也要认真吃饭哦 🍽️';

  const noteEl = document.getElementById('happy-diet-note');
  const countEl = document.getElementById('happy-diet-char-count');
  noteEl?.addEventListener('input', function() {
    const len = this.value.length;
    if (len > 200) this.value = this.value.slice(0, 200);
    countEl.textContent = this.value.length + '/200';
    countEl.style.color = this.value.length > 160 ? '#f472b6' : '#d1d5db';
  });

  document.getElementById('happy-add-diet-upload-trigger')?.addEventListener('click', function() {
    document.getElementById('happy-diet-image-input')?.click();
  });

  document.getElementById('happy-add-diet-back-btn')?.addEventListener('click', function() {
    window.location.href = 'happy-home.html';
  });

  document.getElementById('happy-add-diet-submit-btn')?.addEventListener('click', function() {
    const note = noteEl?.value?.trim() || '';
    if (!note) { showToast('请填写今天吃了什么 🌸'); return; }
    showToast('记录添加成功！继续加油 🎉');
    setTimeout(function() {
      const history = JSON.parse(localStorage.getItem('chime_history') || '["happy-add-diet"]');
      history.pop();
      const prev = history[history.length - 1] || 'happy-home';
      localStorage.setItem('chime_history', JSON.stringify(history));
      window.location.href = prev + '.html';
    }, 1500);
  });
});
</script>
</body>
</html>
