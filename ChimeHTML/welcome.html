<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLife - 欢迎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Welcome specific styles */
    #page-welcome { display: flex !important; }
    .welcome-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="app">
  <!-- ===== WELCOME PAGE ===== -->
  <div id="page-welcome" class="page active">
    <!-- Decorative blobs -->
    <div class="welcome-blob" style="width:300px;height:300px;background:#56d99f;top:-100px;right:-80px;"></div>
    <div class="welcome-blob" style="width:200px;height:200px;background:#fbbf24;bottom:80px;left:-60px;"></div>
    <div class="welcome-blob" style="width:150px;height:150px;background:#34d399;top:260px;right:-40px;"></div>
    <div class="welcome-blob" style="width:120px;height:120px;background:#a7f3d0;top:160px;left:-30px;"></div>

    <!-- Decorative floating food icons -->
    <div style="position:absolute;top:140px;left:22px;z-index:2;font-size:26px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));animation:float 3.5s 0.3s ease-in-out infinite;">🥑</div>
    <div style="position:absolute;top:180px;right:24px;z-index:2;font-size:22px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));animation:float 4s 0.9s ease-in-out infinite;">🍎</div>
    <div style="position:absolute;top:88px;left:40px;z-index:2;font-size:18px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.12));animation:float 3.2s 1.5s ease-in-out infinite;">🥦</div>
    <div style="position:absolute;top:96px;right:46px;z-index:2;font-size:20px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.12));animation:float 3.8s 0.6s ease-in-out infinite;">🍋</div>

    <!-- Curved wave decoration at bottom -->
    <div style="position:absolute;bottom:0;left:0;right:0;height:180px;z-index:1;">
      <svg viewBox="0 0 375 180" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
        <path d="M0 80 Q90 20 188 60 Q280 100 375 40 L375 180 L0 180 Z" fill="rgba(255,255,255,0.08)"/>
        <path d="M0 110 Q100 60 190 90 Q290 120 375 70 L375 180 L0 180 Z" fill="rgba(255,255,255,0.06)"/>
      </svg>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;height:100%;padding:52px 32px 36px;justify-content:space-between;position:relative;z-index:10;">

      <!-- Logo circle -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding-top:10px;">
        <div class="float-anim" style="position:relative;">
          <!-- Outer glow ring -->
          <div style="position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(86,217,159,0.35),transparent 70%);"></div>
          <!-- Shadow ring -->
          <div style="position:absolute;inset:-4px;border-radius:50%;box-shadow:0 16px 48px rgba(5,150,105,0.45),0 4px 20px rgba(0,0,0,0.2);"></div>
          <!-- Logo circle -->
          <div style="
            width:148px;height:148px;border-radius:50%;
            background:white;
            display:flex;align-items:center;justify-content:center;
            position:relative;
            box-shadow:0 20px 60px rgba(5,150,105,0.5),0 8px 24px rgba(0,0,0,0.18),inset 0 2px 6px rgba(255,255,255,0.9);
            overflow:hidden;
          ">
            <!-- Inner gradient ring -->
            <div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,rgba(86,217,159,0.12),rgba(5,150,105,0.06));"></div>
            <!-- Logo image -->
            <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=400&q=80" alt="NutriLife Logo" style="width:110px;height:110px;border-radius:50%;object-fit:cover;position:relative;z-index:1;">
          </div>
        </div>

        <div style="text-align:center;">
          <h1 style="font-size:34px;font-weight:900;color:white;line-height:1.1;text-shadow:0 2px 16px rgba(0,0,0,0.15);letter-spacing:-0.5px;">
            NutriLife
          </h1>
          <p style="font-size:14px;color:rgba(255,255,255,0.88);margin-top:8px;font-weight:500;letter-spacing:0.04em;">
            科学饮食 · 健康生活 · 活力每天
          </p>
        </div>
      </div>

      <!-- CTA button -->
      <div style="width:100%;padding-bottom:64px;">
        <button id="welcome-start-btn" style="
          background: white;
          color: #065f46;
          border: none;
          border-radius: 20px;
          padding: 16px;
          font-weight: 800;
          font-size: 17px;
          cursor: pointer;
          width: 100%;
          box-shadow: 0 8px 32px rgba(0,0,0,0.18);
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          transition: all 0.3s;
        ">
          <span>开始健康之旅</span>
          <i data-lucide="arrow-right" style="width:20px;height:20px;"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="img-viewer-overlay">
    <div id="img-viewer-close" style="position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="img-viewer-img" src="" alt="">
    <p id="img-viewer-caption" style="color:white;margin-top:16px;font-size:14px;text-align:center;"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  // Welcome start button
  const startBtn = document.getElementById('welcome-start-btn');
  if (startBtn) {
    startBtn.addEventListener('click', function() {
      localStorage.setItem('chime_history', JSON.stringify(['welcome', 'version']));
      window.location.href = 'version.html';
    });
  }
});
</script>
</body>
</html>
