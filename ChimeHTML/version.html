<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLife - 选择版本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    #page-version { display: flex !important; flex-direction: column !important; }
  </style>
</head>
<body>
<div id="app">
  <!-- ===== VERSION SELECT ===== -->
  <div id="page-version" class="page">
    <!-- Decorative -->
    <div style="position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:linear-gradient(135deg,#bbf7d0,#86efac);border-radius:50%;opacity:0.5;"></div>
    <div style="position:absolute;bottom:-80px;left:-40px;width:180px;height:180px;background:linear-gradient(135deg,#fde68a,#fbbf24);border-radius:50%;opacity:0.4;"></div>

    <div style="display:flex;flex-direction:column;align-items:center;height:100%;padding:60px 24px 40px;position:relative;z-index:10;">
      <div style="text-align:center;margin-bottom:8px;">
        <p style="font-size:13px;color:#6b7280;font-weight:500;">为你量身打造</p>
        <h2 style="font-size:24px;font-weight:800;color:#1f2937;margin-top:4px;">选择你的风格</h2>
      </div>

      <!-- Character comparison -->
      <div style="display:flex;gap:16px;margin:16px 0;width:100%;align-items:stretch;">
        <!-- Discipline Card -->
        <div id="version-dis-btn" style="
          flex:1;
          background: linear-gradient(145deg, #f0fdf4, #dcfce7);
          border: 2px solid #86efac;
          border-radius: 24px;
          padding: 20px 12px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
          cursor: pointer;
          transition: all 0.3s;
          box-shadow: 0 4px 20px rgba(5,150,105,0.12);
          position: relative;
          overflow: hidden;
        ">
          <div style="font-size:56px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1);">🥗</div>
          <div style="text-align:center;">
            <div style="font-size:16px;font-weight:800;color:#065f46;">自律版</div>
            <div style="font-size:11px;color:#059669;margin-top:3px;font-weight:500;">专业 · 详细 · 科学</div>
          </div>
          <div style="width:100%;background:#e0f2e9;border-radius:8px;padding:8px;font-size:10px;color:#374151;line-height:1.5;">
            ✅ 完整营养数据<br/>✅ 卡路里追踪<br/>✅ 数据统计图表
          </div>
          <div style="
            background: linear-gradient(135deg,#059669,#10b981);
            color:white;
            font-size:13px;
            font-weight:700;
            padding:8px 20px;
            border-radius:12px;
            width:100%;
            text-align:center;
          ">选择自律版</div>
        </div>

        <!-- Happy Card -->
        <div id="version-happy-btn" style="
          flex:1;
          background: linear-gradient(145deg, #fff0f9, #fce7f3);
          border: 2px solid #f9a8d4;
          border-radius: 24px;
          padding: 20px 12px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
          cursor: pointer;
          transition: all 0.3s;
          box-shadow: 0 4px 20px rgba(244,114,182,0.12);
        ">
          <div style="font-size:56px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1);">🎉</div>
          <div style="text-align:center;">
            <div style="font-size:16px;font-weight:800;color:#9d174d;">欢乐版</div>
            <div style="font-size:11px;color:#f472b6;margin-top:3px;font-weight:500;">可爱 · 轻松 · 趣味</div>
          </div>
          <div style="width:100%;background:#fde8f3;border-radius:8px;padding:8px;font-size:10px;color:#374151;line-height:1.5;">
            🌈 糖果色主题<br/>🎀 轻量记录<br/>✨ 趣味打卡
          </div>
          <div style="
            background: linear-gradient(135deg,#f472b6,#fb923c);
            color:white;
            font-size:13px;
            font-weight:700;
            padding:8px 20px;
            border-radius:12px;
            width:100%;
            text-align:center;
          ">选择欢乐版</div>
        </div>
      </div>

      <!-- Bottom tip -->
      <div style="background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);border:1px solid #e5e7eb;border-radius:16px;padding:12px 16px;width:100%;text-align:center;margin-top:4px;">
        <p style="font-size:12px;color:#6b7280;">两种版本可随时切换，数据共享 🔄</p>
      </div>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="img-viewer-overlay">
    <div id="img-viewer-close" style="position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="img-viewer-img" src="" alt="">
    <p id="img-viewer-caption" style="color:white;margin-top:16px;font-size:14px;text-align:center;"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  // Version selection buttons
  const disBtn = document.getElementById('version-dis-btn');
  const happyBtn = document.getElementById('version-happy-btn');

  if (disBtn) {
    disBtn.addEventListener('click', function() {
      AppState.currentVersion = 'discipline';
      AppState.saveVersion();
      localStorage.setItem('chime_history', JSON.stringify(['welcome', 'version', 'dis-home']));
      window.location.href = 'dis-home.html';
    });
  }

  if (happyBtn) {
    happyBtn.addEventListener('click', function() {
      AppState.currentVersion = 'happy';
      AppState.saveVersion();
      localStorage.setItem('chime_history', JSON.stringify(['welcome', 'version', 'happy-home']));
      window.location.href = 'happy-home.html';
    });
  }
});
</script>
</body>
</html>
