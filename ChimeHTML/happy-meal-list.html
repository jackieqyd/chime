<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLife - 餐次列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Nunito', sans-serif; }
  </style>
</head>
<body>
<div id="app">
  <div style="background:#fff0f9;min-height:100vh;position:relative;">
    <div style="background:linear-gradient(135deg,#f472b6,#fb923c);padding:44px 20px 20px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="happy-meal-list-back-btn" style="width:36px;height:36px;background:rgba(255,255,255,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <i data-lucide="arrow-left" style="width:18px;height:18px;color:white;"></i>
        </div>
        <h2 style="color:white;font-size:18px;font-weight:800;">餐次列表</h2>
      </div>
    </div>
    <div class="scroll-content" style="padding:16px;" id="happy-meal-list-content">
      <!-- Content generated by JS -->
    </div>
  </div>

  <div id="img-viewer-overlay">
    <div id="img-viewer-close" style="position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="img-viewer-img" src="" alt="">
    <p id="img-viewer-caption" style="color:white;margin-top:16px;font-size:14px;text-align:center;"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  const content = document.getElementById('happy-meal-list-content');
  if (content) {
    content.innerHTML = `
      <div class="happy-meal-card" style="padding:14px;margin-bottom:12px;cursor:pointer;" onclick="window.location.href='happy-meal-detail.html'">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;">
          <div style="width:44px;height:44px;background:linear-gradient(135deg,#fef9c3,#fde68a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 12px rgba(251,191,36,0.25);flex-shrink:0;">🌅</div>
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:15px;font-weight:800;color:#1f2937;">早餐</span>
              <span style="font-size:12px;font-weight:700;color:#f472b6;">320 kcal</span>
            </div>
            <span style="font-size:11px;color:#9ca3af;">07:30 · 燕麦粥、鸡蛋、牛奶</span>
          </div>
        </div>
      </div>
      <div class="happy-meal-card" style="padding:14px;margin-bottom:12px;cursor:pointer;" onclick="window.location.href='happy-meal-detail.html'">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="width:44px;height:44px;background:linear-gradient(135deg,#d1fae5,#6ee7b7);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 12px rgba(52,211,153,0.25);flex-shrink:0;">☀️</div>
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:15px;font-weight:800;color:#1f2937;">午餐</span>
              <span style="font-size:12px;font-weight:700;color:#f472b6;">380 kcal</span>
            </div>
            <span style="font-size:11px;color:#9ca3af;">12:15 · 糙米饭、清蒸鱼、西兰花</span>
          </div>
        </div>
      </div>
    `;
  }

  document.getElementById('happy-meal-list-back-btn')?.addEventListener('click', function() {
    const history = JSON.parse(localStorage.getItem('chime_history') || '["happy-home"]');
    history.pop();
    const prev = history[history.length - 1] || 'happy-home';
    localStorage.setItem('chime_history', JSON.stringify(history));
    window.location.href = prev + '.html';
  });
});
</script>
</body>
</html>
