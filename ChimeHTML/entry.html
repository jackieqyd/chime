<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLife - 录入饮食</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page { display: flex; flex-direction: column; width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow: hidden; }
  </style>
</head>
<body>
<div id="app">
  <!-- ===== ENTRY ===== -->
  <div id="page-entry" class="page" style="background:#f8fafc;">
    <div id="entry-header" style="background:linear-gradient(135deg,#065f46,#059669);padding:50px 20px 20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
        <div id="entry-back-btn" style="width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <i data-lucide="arrow-left" style="width:18px;height:18px;color:white;"></i>
        </div>
        <div>
          <h2 style="color:white;font-size:18px;font-weight:800;">录入饮食数据</h2>
          <p style="color:rgba(255,255,255,0.7);font-size:12px;" id="entry-date-label">今天 · 2025年1月15日</p>
        </div>
      </div>
    </div>

    <div class="scroll-content" style="padding:16px;padding-bottom:32px;">
      <!-- Meal Type Selector -->
      <div style="background:white;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
        <p style="font-size:12px;color:#6b7280;font-weight:600;margin-bottom:10px;">选择餐次</p>
        <div style="display:flex;gap:8px;">
          <div id="meal-type-breakfast" style="flex:1;background:#f0fdf4;border:2px solid #059669;border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:20px;">🌅</div>
            <div style="font-size:11px;color:#059669;font-weight:700;margin-top:3px;">早餐</div>
          </div>
          <div id="meal-type-lunch" style="flex:1;background:#f9fafb;border:2px solid transparent;border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:20px;">☀️</div>
            <div style="font-size:11px;color:#6b7280;font-weight:600;margin-top:3px;">午餐</div>
          </div>
          <div id="meal-type-dinner" style="flex:1;background:#f9fafb;border:2px solid transparent;border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:20px;">🌙</div>
            <div style="font-size:11px;color:#6b7280;font-weight:600;margin-top:3px;">晚餐</div>
          </div>
          <div id="meal-type-snack" style="flex:1;background:#f9fafb;border:2px solid transparent;border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:20px;">🍎</div>
            <div style="font-size:11px;color:#6b7280;font-weight:600;margin-top:3px;">加餐</div>
          </div>
        </div>
      </div>

      <!-- Quick Add -->
      <div style="background:white;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
        <p style="font-size:12px;color:#6b7280;font-weight:600;margin-bottom:10px;">快速添加</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          <span class="quick-food-tag" data-food="燕麦粥" style="background:#f0fdf4;border:1px solid #d1fae5;color:#059669;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🥣 燕麦粥</span>
          <span class="quick-food-tag" data-food="鸡蛋" style="background:#fef9c3;border:1px solid #fde68a;color:#92400e;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🥚 鸡蛋</span>
          <span class="quick-food-tag" data-food="牛奶" style="background:#eff6ff;border:1px solid #dbeafe;color:#1d4ed8;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🥛 牛奶</span>
          <span class="quick-food-tag" data-food="糙米饭" style="background:#fdf4ff;border:1px solid #f3e8ff;color:#7e22ce;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🍚 糙米饭</span>
          <span class="quick-food-tag" data-food="鸡胸肉" style="background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🍗 鸡胸肉</span>
          <span class="quick-food-tag" data-food="西兰花" style="background:#f0fdf4;border:1px solid #d1fae5;color:#065f46;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🥦 西兰花</span>
          <span class="quick-food-tag" data-food="苹果" style="background:#fff1f2;border:1px solid #ffe4e6;color:#be123c;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🍎 苹果</span>
          <span class="quick-food-tag" data-food="沙拉" style="background:#f0fdf4;border:1px solid #d1fae5;color:#059669;font-size:11px;font-weight:600;padding:5px 10px;border-radius:10px;cursor:pointer;">🥗 沙拉</span>
        </div>
      </div>

      <!-- Food Input Form -->
      <div style="background:white;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
        <p style="font-size:12px;color:#6b7280;font-weight:600;margin-bottom:10px;">手动输入食物</p>
        <div style="display:flex;gap:8px;margin-bottom:10px;">
          <div style="flex:2;">
            <label style="font-size:11px;color:#6b7280;font-weight:600;">食物名称</label>
            <input id="food-name-input" class="input-field" type="text" placeholder="如：鸡胸肉" style="margin-top:4px;" />
          </div>
          <div style="flex:1;">
            <label style="font-size:11px;color:#6b7280;font-weight:600;">克重(g)</label>
            <input id="food-weight-input" class="input-field" type="number" placeholder="100" style="margin-top:4px;" />
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
          <div>
            <label style="font-size:11px;color:#6b7280;font-weight:600;">热量 (kcal)</label>
            <input id="food-kcal-input" class="input-field" type="number" placeholder="165" style="margin-top:4px;" />
          </div>
          <div>
            <label style="font-size:11px;color:#6b7280;font-weight:600;">碳水 (g)</label>
            <input id="food-carb-input" class="input-field" type="number" placeholder="0" style="margin-top:4px;" />
          </div>
          <div>
            <label style="font-size:11px;color:#6b7280;font-weight:600;">蛋白质 (g)</label>
            <input id="food-prot-input" class="input-field" type="number" placeholder="31" style="margin-top:4px;" />
          </div>
          <div>
            <label style="font-size:11px;color:#6b7280;font-weight:600;">脂肪 (g)</label>
            <input id="food-fat-input" class="input-field" type="number" placeholder="3.6" style="margin-top:4px;" />
          </div>
        </div>
        <button id="add-food-btn" class="btn-primary">
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
            <i data-lucide="plus-circle" style="width:18px;height:18px;"></i>
            <span>添加食物</span>
          </div>
        </button>
      </div>

      <!-- Added Foods Preview -->
      <div style="background:white;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <p style="font-size:12px;color:#6b7280;font-weight:600;">已添加食物</p>
          <span style="font-size:11px;color:#059669;font-weight:700;" id="entry-total-kcal">合计: 0 kcal</span>
        </div>
        <div id="added-foods-list" style="min-height:40px;">
          <div style="text-align:center;padding:12px;color:#d1d5db;font-size:12px;">还没有添加食物</div>
        </div>
      </div>

      <!-- Submit Button -->
      <button id="submit-entry-btn" class="btn-primary">
        <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
          <i data-lucide="check-circle" style="width:18px;height:18px;"></i>
          <span>完成录入</span>
        </div>
      </button>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="img-viewer-overlay">
    <div id="img-viewer-close" style="position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="img-viewer-img" src="" alt="">
    <p id="img-viewer-caption" style="color:white;margin-top:16px;font-size:14px;text-align:center;"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
  updateDateTime();
  if (typeof updateEntryHeader === 'function') updateEntryHeader();
  updateFoodListUI();

  document.getElementById('entry-back-btn')?.addEventListener('click', function() {
    window.location.href = 'dis-home.html';
  });

  // Meal type selection
  ['breakfast','lunch','dinner','snack'].forEach(function(type) {
    var el = document.getElementById('meal-type-' + type);
    if (el) {
      el.addEventListener('click', function() {
        ['breakfast','lunch','dinner','snack'].forEach(function(t) {
          var btn = document.getElementById('meal-type-' + t);
          if (btn) {
            btn.style.background = '#f9fafb';
            btn.style.borderColor = 'transparent';
            btn.querySelector('div:last-child').style.color = '#6b7280';
          }
        });
        el.style.background = '#f0fdf4';
        el.style.borderColor = '#059669';
        el.querySelector('div:last-child').style.color = '#059669';
        AppState.currentMealDetail = type;
        AppState.saveMeal();
      });
    }
  }

  // Quick food tags
  document.querySelectorAll('.quick-food-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      var foodName = this.getAttribute('data-food');
      if (typeof addFoodToList === 'function') addFoodToList(foodName);
    });
  });

  // Add food button
  document.getElementById('add-food-btn')?.addEventListener('click', function() {
    var nameEl = document.getElementById('food-name-input');
    var wEl = document.getElementById('food-weight-input');
    var kEl = document.getElementById('food-kcal-input');
    var cEl = document.getElementById('food-carb-input');
    var pEl = document.getElementById('food-prot-input');
    var fEl = document.getElementById('food-fat-input');
    var name = nameEl?.value.trim();
    if (!name) { showToast('请输入食物名称 ⚠️'); return; }
    AppState.addedFoods.push({
      name: name,
      weight: (wEl?.value ? wEl.value + 'g' : ''),
      kcal: parseInt(kEl?.value) || 0,
      carb: cEl?.value || '0',
      prot: pEl?.value || '0',
      fat: fEl?.value || '0'
    });
    if (nameEl) nameEl.value = '';
    if (wEl) wEl.value = '';
    if (kEl) kEl.value = '';
    if (cEl) cEl.value = '';
    if (pEl) pEl.value = '';
    if (fEl) fEl.value = '';
    updateFoodListUI();
    showToast('已添加 ' + name + ' 🥗');
  });

  // Submit
  document.getElementById('submit-entry-btn')?.addEventListener('click', function() {
    if (AppState.addedFoods.length === 0) { showToast('请先添加食物 ⚠️'); return; }
    AppState.addedFoods = [];
    updateFoodListUI();
    showToast('录入成功！数据已保存 ✅');
    setTimeout(function() {
      window.location.href = 'dis-home.html';
    }, 1500);
  });
});
</script>
</body>
</html>
