<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLife - 我的</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .page { display: flex; flex-direction: column; width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow: hidden; }
  </style>
</head>
<body>
<div id="app">
  <!-- ===== HAPPY PROFILE ===== -->
  <div id="page-happy-profile" class="page" style="background:linear-gradient(180deg,#fff0f9 0%,#fff8f0 50%,#f0f8ff 100%);">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,#f472b6,#fb923c,#fbbf24);padding:44px 20px 0;position:relative;overflow:hidden;border-radius:0 0 32px 32px;">
      <div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,0.1);border-radius:50%;"></div>
      <div style="position:absolute;top:60px;left:-30px;width:100px;height:100px;background:rgba(255,255,255,0.07);border-radius:50%;"></div>
      <!-- Confetti -->
      <div style="position:absolute;top:50px;right:80px;width:8px;height:8px;background:#fbbf24;border-radius:50%;opacity:0.7;"></div>
      <div style="position:absolute;top:70px;right:30px;width:6px;height:6px;background:white;border-radius:50%;opacity:0.5;"></div>
      <div style="position:absolute;top:90px;left:50px;width:7px;height:7px;background:#a7f3d0;border-radius:50%;opacity:0.6;"></div>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div id="happy-profile-back-btn" style="width:36px;height:36px;background:rgba(255,255,255,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <i data-lucide="arrow-left" style="width:18px;height:18px;color:white;"></i>
        </div>
        <h2 style="color:white;font-size:18px;font-weight:800;">个人中心</h2>
      </div>

      <!-- Avatar Section -->
      <div style="display:flex;flex-direction:column;align-items:center;padding-bottom:28px;">
        <div style="position:relative;margin-bottom:10px;">
          <div style="width:80px;height:80px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#fff,#fde68a,#f9a8d4);display:flex;align-items:center;justify-content:center;">
            <div id="happy-profile-avatar-display" style="width:74px;height:74px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;">
              🙂
            </div>
          </div>
          <div style="position:absolute;bottom:0;right:0;width:24px;height:24px;background:linear-gradient(135deg,#f472b6,#fb923c);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(244,114,182,0.4);">
            <i data-lucide="camera" style="width:12px;height:12px;color:white;"></i>
          </div>
        </div>
        <h3 style="color:white;font-size:18px;font-weight:900;" id="happy-profile-username">小绿同学</h3>
        <p style="color:rgba(255,255,255,0.8);font-size:12px;margin-top:2px;">快乐生活第 7 天 🌈</p>
        <!-- Stats row -->
        <div style="display:flex;gap:16px;margin-top:14px;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border-radius:16px;padding:10px 20px;border:1px solid rgba(255,255,255,0.3);">
          <div style="text-align:center;">
            <div style="color:white;font-size:16px;font-weight:900;">7</div>
            <div style="color:rgba(255,255,255,0.8);font-size:10px;font-weight:600;">打卡天数</div>
          </div>
          <div style="width:1px;background:rgba(255,255,255,0.3);"></div>
          <div style="text-align:center;">
            <div style="color:white;font-size:16px;font-weight:900;">21</div>
            <div style="color:rgba(255,255,255,0.8);font-size:10px;font-weight:600;">已录入餐次</div>
          </div>
          <div style="width:1px;background:rgba(255,255,255,0.3);"></div>
          <div style="text-align:center;">
            <div style="color:white;font-size:16px;font-weight:900;">3</div>
            <div style="color:rgba(255,255,255,0.8);font-size:10px;font-weight:600;">获得徽章</div>
          </div>
        </div>
      </div>
    </div>

    <div class="scroll-content" style="padding:16px;padding-bottom:32px;margin-top:-14px;">

      <!-- Basic Info Card -->
      <div style="background:white;border-radius:24px;padding:16px;margin-bottom:12px;box-shadow:0 6px 24px rgba(244,114,182,0.1);border:1.5px solid #fce7f3;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:28px;height:28px;background:linear-gradient(135deg,#f472b6,#fb923c);border-radius:8px;display:flex;align-items:center;justify-content:center;">
              <i data-lucide="user" style="width:14px;height:14px;color:white;"></i>
            </div>
            <h4 style="font-size:14px;font-weight:800;color:#1f2937;">基本信息</h4>
          </div>
          <div style="background:linear-gradient(135deg,#fff0f9,#fce7f3);border:1px solid #fbcfe8;border-radius:8px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <i data-lucide="edit-2" style="width:12px;height:12px;color:#f472b6;"></i>
            <span style="font-size:11px;color:#f472b6;font-weight:700;">编辑</span>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div style="background:linear-gradient(135deg,#fff0f9,#fce7f3);border-radius:14px;padding:10px;border:1px solid #fbcfe8;">
            <div style="font-size:10px;color:#9ca3af;font-weight:500;margin-bottom:2px;">年龄</div>
            <div style="font-size:15px;font-weight:800;color:#1f2937;" id="happy-profile-age">25 岁</div>
          </div>
          <div style="background:linear-gradient(135deg,#fff7ed,#fef3c7);border-radius:14px;padding:10px;border:1px solid #fed7aa;">
            <div style="font-size:10px;color:#9ca3af;font-weight:500;margin-bottom:2px;">性别</div>
            <div style="font-size:15px;font-weight:800;color:#1f2937;" id="happy-profile-gender">女 👧</div>
          </div>
          <div style="background:linear-gradient(135deg,#f0fdf4,#d1fae5);border-radius:14px;padding:10px;border:1px solid #a7f3d0;">
            <div style="font-size:10px;color:#9ca3af;font-weight:500;margin-bottom:2px;">身高</div>
            <div style="font-size:15px;font-weight:800;color:#1f2937;" id="happy-profile-height">165 cm</div>
          </div>
          <div style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:14px;padding:10px;border:1px solid #bfdbfe;">
            <div style="font-size:10px;color:#9ca3af;font-weight:500;margin-bottom:2px;">体重</div>
            <div style="font-size:15px;font-weight:800;color:#1f2937;" id="happy-profile-weight">55 kg</div>
          </div>
          <div style="background:linear-gradient(135deg,#fdf4ff,#f3e8ff);border-radius:14px;padding:10px;border:1px solid #e9d5ff;">
            <div style="font-size:10px;color:#9ca3af;font-weight:500;margin-bottom:2px;">目标体重</div>
            <div style="font-size:15px;font-weight:800;color:#a855f7;" id="happy-profile-target-weight">50 kg</div>
          </div>
          <div style="background:linear-gradient(135deg,#fef9c3,#fde68a);border-radius:14px;padding:10px;border:1px solid #fbbf24;">
            <div style="font-size:10px;color:#9ca3af;font-weight:500;margin-bottom:2px;">BMI</div>
            <div style="font-size:15px;font-weight:800;color:#d97706;">20.2</div>
          </div>
        </div>
      </div>

      <!-- Diet Preferences -->
      <div style="background:white;border-radius:24px;padding:16px;margin-bottom:12px;box-shadow:0 6px 24px rgba(244,114,182,0.1);border:1.5px solid #fce7f3;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <div style="width:28px;height:28px;background:linear-gradient(135deg,#fb923c,#fbbf24);border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <i data-lucide="heart" style="width:14px;height:14px;color:white;"></i>
          </div>
          <h4 style="font-size:14px;font-weight:800;color:#1f2937;">饮食偏好 🌸</h4>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <span style="background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1px solid #a7f3d0;color:#065f46;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;">🥗 清淡</span>
          <span style="background:linear-gradient(135deg,#fef9c3,#fde68a);border:1px solid #fbbf24;color:#92400e;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;">🍜 不辣</span>
          <span style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #93c5fd;color:#1d4ed8;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;">🐟 高蛋白</span>
          <span style="background:linear-gradient(135deg,#fdf4ff,#f3e8ff);border:1px solid #d8b4fe;color:#7e22ce;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;">🥑 低脂</span>
          <span style="background:linear-gradient(135deg,#fff0f9,#fce7f3);border:1px solid #fbcfe8;color:#be185d;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;">🍬 偶尔甜食</span>
          <span style="background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1px solid #fed7aa;color:#c2410c;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;">🏃 运动爱好</span>
        </div>
      </div>

      <!-- 快乐足迹 -->
      <div style="background:white;border-radius:24px;padding:16px;margin-bottom:12px;box-shadow:0 6px 24px rgba(244,114,182,0.1);border:1.5px solid #fce7f3;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <div style="width:28px;height:28px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <i data-lucide="map-pin" style="width:14px;height:14px;color:white;"></i>
          </div>
          <h4 style="font-size:14px;font-weight:800;color:#1f2937;">快乐足迹 ✨</h4>
        </div>
        <!-- Badge row -->
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
          <div style="background:linear-gradient(135deg,#fef9c3,#fde68a);border-radius:16px;padding:10px 14px;text-align:center;border:1.5px solid #fbbf24;flex:1;min-width:70px;">
            <div style="font-size:24px;margin-bottom:4px;">🏆</div>
            <div style="font-size:10px;font-weight:700;color:#92400e;">连续7天</div>
          </div>
          <div style="background:linear-gradient(135deg,#fce7f3,#fde8b0);border-radius:16px;padding:10px 14px;text-align:center;border:1.5px solid #f472b6;flex:1;min-width:70px;">
            <div style="font-size:24px;margin-bottom:4px;">💕</div>
            <div style="font-size:10px;font-weight:700;color:#9d174d;">营养均衡</div>
          </div>
          <div style="background:linear-gradient(135deg,#ede9fe,#c4b5fd);border-radius:16px;padding:10px 14px;text-align:center;border:1.5px solid #a78bfa;flex:1;min-width:70px;">
            <div style="font-size:24px;margin-bottom:4px;">⭐</div>
            <div style="font-size:10px;font-weight:700;color:#5b21b6;">美食达人</div>
          </div>
        </div>
        <!-- Timeline -->
        <div style="display:flex;flex-direction:column;gap:0;">
          <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;position:relative;">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">
              <div style="width:32px;height:32px;background:linear-gradient(135deg,#f472b6,#fb923c);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(244,114,182,0.35);">
                <span style="font-size:14px;">🎉</span>
              </div>
              <div style="width:2px;flex:1;background:linear-gradient(to bottom,#fbcfe8,transparent);min-height:24px;margin-top:4px;"></div>
            </div>
            <div style="flex:1;padding-top:4px;">
              <div style="font-size:13px;font-weight:800;color:#1f2937;">连续打卡 7 天！</div>
              <div style="font-size:11px;color:#6b7280;margin-top:2px;">超棒的坚持，给自己一个大大的赞 👏</div>
              <div style="font-size:10px;color:#f472b6;font-weight:700;margin-top:4px;">今日</div>
            </div>
          </div>
          <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">
              <div style="width:32px;height:32px;background:linear-gradient(135deg,#fef9c3,#fde68a);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fbbf24;">
                <span style="font-size:14px;">🌟</span>
              </div>
              <div style="width:2px;flex:1;background:linear-gradient(to bottom,#fbcfe8,transparent);min-height:24px;margin-top:4px;"></div>
            </div>
            <div style="flex:1;padding-top:4px;">
              <div style="font-size:13px;font-weight:800;color:#1f2937;">首次记录午餐美照 📸</div>
              <div style="font-size:11px;color:#6b7280;margin-top:2px;">精致饮食，从记录开始！</div>
              <div style="font-size:10px;color:#9ca3af;font-weight:600;margin-top:4px;">3天前</div>
            </div>
          </div>
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="flex-shrink:0;">
              <div style="width:32px;height:32px;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #34d399;">
                <span style="font-size:14px;">🌈</span>
              </div>
            </div>
            <div style="flex:1;padding-top:4px;">
              <div style="font-size:13px;font-weight:800;color:#1f2937;">加入欢乐版大家庭</div>
              <div style="font-size:11px;color:#6b7280;margin-top:2px;">开启轻松愉快的健康生活 🎀</div>
              <div style="font-size:10px;color:#9ca3af;font-weight:600;margin-top:4px;">7天前</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="img-viewer-overlay">
    <div id="img-viewer-close" style="position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="img-viewer-img" src="" alt="">
    <p id="img-viewer-caption" style="color:white;margin-top:16px;font-size:14px;text-align:center;"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  document.getElementById('happy-profile-back-btn')?.addEventListener('click', function() {
    window.location.href = 'happy-home.html';
  });

  if (typeof AppState !== 'undefined' && AppState.userProfile) {
    var p = AppState.userProfile;
    var nameEl = document.getElementById('happy-profile-username');
    if (nameEl) nameEl.textContent = p.name;
    var ageEl = document.getElementById('happy-profile-age');
    if (ageEl) ageEl.textContent = p.age + ' 岁';
    var genderEl = document.getElementById('happy-profile-gender');
    if (genderEl) genderEl.textContent = p.gender;
    var heightEl = document.getElementById('happy-profile-height');
    if (heightEl) heightEl.textContent = p.height + ' cm';
    var weightEl = document.getElementById('happy-profile-weight');
    if (weightEl) weightEl.textContent = p.weight + ' kg';
    var targetEl = document.getElementById('happy-profile-target-weight');
    if (targetEl) targetEl.textContent = p.targetWeight + ' kg';
  }
});
</script>
</body>
</html>
